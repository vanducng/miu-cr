name: release

on:
  push:
    branches: [main]   # release-please opens/updates the version PR
    tags: ["v*"]        # a version tag runs goreleaser directly
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Auto-versioning from conventional commits. Mints a MunMiu GitHub App token so the
  # release commit/tag it creates re-triggers the goreleaser job below (a GITHUB_TOKEN
  # tag would not trigger downstream workflows).
  release-please:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_MUNMIU_PRIVATE_KEY }}
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Builds + publishes binaries/checksums on any v* tag. Homebrew tap publish is
  # skipped automatically when HOMEBREW_TAP_GITHUB_TOKEN is not configured, so the
  # GitHub release (and install.sh) works without it.
  goreleaser:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.8"
          cache-dependency-path: go.sum
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: v2.15.4
          install-only: true
      - name: GoReleaser release
        run: |
          skip=""
          if [ -z "$HOMEBREW_TAP_GITHUB_TOKEN" ]; then
            echo "::notice::HOMEBREW_TAP_GITHUB_TOKEN absent — skipping Homebrew tap publish"
            skip="--skip=homebrew"
          fi
          goreleaser release --clean $skip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}
