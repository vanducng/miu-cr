name: release

on:
  push:
    branches: [main]   # release-please opens/updates the version PR
    tags: ["v*"]        # a version tag runs goreleaser directly
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Auto-versioning from conventional commits. Mints a MunMiu GitHub App token so the
  # release commit/tag it creates re-triggers the goreleaser job below (a GITHUB_TOKEN
  # tag would not trigger downstream workflows).
  release-please:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_MUNMIU_PRIVATE_KEY }}
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Builds + publishes binaries/checksums on any v* tag. Homebrew tap publish is
  # skipped automatically when HOMEBREW_TAP_GITHUB_TOKEN is not configured, so the
  # GitHub release (and install.sh) works without it.
  goreleaser:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.8"
          cache-dependency-path: go.sum
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: v2.15.4
          install-only: true
      - name: GoReleaser release
        run: |
          skip=""
          if [ -z "$HOMEBREW_TAP_GITHUB_TOKEN" ]; then
            echo "::notice::HOMEBREW_TAP_GITHUB_TOKEN absent — skipping Homebrew tap publish"
            skip="--skip=homebrew"
          fi
          goreleaser release --clean $skip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}

      # Rebuild the docs on main now the tag exists, so the CI-stamped version is
      # current. We dispatch on main (not the tag) because the github-pages
      # environment only allows deploys from main — a tag-triggered Pages deploy
      # is rejected by the environment protection rule.
      - name: Refresh docs to the new version
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run "Deploy Documentation" --ref main

  # release-please publishes a bare release body (auto-generated notes only) and goreleaser
  # uploads binaries with mode:keep-existing, so that bare body is never enriched. action.yml
  # is listed on the GitHub Marketplace, which renders whatever the release body contains.
  # This job rewrites every tagged release with a rich, human-readable description (usage,
  # inputs, how-it-works) plus the matching CHANGELOG section, so the Marketplace listing
  # stays informative automatically with no manual editing per release.
  marketplace-release-notes:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: goreleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enrich Marketplace release notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG_NAME="${GITHUB_REF_NAME}"
          VERSION="${TAG_NAME#v}"
          NOTES_FILE="$(mktemp)"

          # Quoted heredoc keeps the markdown literal (no shell expansion of backticks or $).
          # __TAG__ is the only placeholder, substituted with the real tag just below.
          # The api-key line uses GitHub's ${{ '<expr>' }} escape so the runner emits the
          # literal "${{ secrets.ANTHROPIC_API_KEY }}" text instead of evaluating the secret.
          cat > "$NOTES_FILE" <<'TEMPLATE'
          ## miu-cr PR Review — __TAG__

          **AI-powered pull request code review as a GitHub Action.** Drop it into any workflow to get inline comments, severity-gated CI checks, and idempotent re-runs — all powered by your own LLM key (Anthropic or OpenAI-compatible).

          ### Usage

          ```yaml
          - uses: actions/checkout@v4
          - uses: vanducng/miu-cr@__TAG__
            with:
              api-key: ${{ '${{ secrets.ANTHROPIC_API_KEY }}' }}
              gate: high   # fail CI if any finding reaches this severity
          ```

          **Required permission:**
          ```yaml
          permissions:
            pull-requests: write
          ```

          ### Inputs

          | Input | Required | Default | Description |
          |-------|----------|---------|-------------|
          | `api-key` | ✅ | — | Anthropic (or compatible) API key |
          | `github-token` | ❌ | `github.token` | Token to read PR and post comments |
          | `gate` | ❌ | `high` | Severity gate: `none\|low\|medium\|high\|critical` |
          | `version` | ❌ | `latest` | Pin a specific `miucr` binary version |
          | `base-url` | ❌ | — | Anthropic-compatible gateway URL (e.g. GLM/z.ai) |
          | `model` | ❌ | — | Model override for the provider |

          ### How it works

          1. Installs the `miucr` binary (static, pure-Go — no Docker, no extra deps).
          2. Runs `miucr review --pr <repo>#<PR> --post --gate <gate>`.
          3. Posts inline review comments anchored to exact diff lines; re-runs are idempotent (summary is edited, duplicate comments skipped).
          4. Exits non-zero if any finding meets or exceeds the configured severity gate.

          > **Note:** Only works on `pull_request` events from the same repo. Fork PRs are guarded against secret leakage; automated fork review is the serve daemon's job.

          ### Full documentation

          https://miucr.vanducng.dev
          TEMPLATE

          sed -i "s/__TAG__/${TAG_NAME}/g" "$NOTES_FILE"

          # Append this version's CHANGELOG section (from its header to the next "## [" header).
          CHANGES="$(awk -v ver="$VERSION" '
            index($0, "## [" ver "]") == 1 { capture = 1; next }
            capture && /^## \[/ { capture = 0 }
            capture { print }
          ' CHANGELOG.md | sed -e '/./,$!d')"
          if [ -n "$CHANGES" ]; then
            {
              printf '\n## What changed\n\n'
              printf '%s\n' "$CHANGES"
            } >> "$NOTES_FILE"
          fi

          gh release edit "$TAG_NAME" \
            --title "$TAG_NAME" \
            --notes "$(cat "$NOTES_FILE")"
