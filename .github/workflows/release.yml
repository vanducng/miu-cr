name: release

on:
  push:
    branches: [main]   # release-please opens/updates the version PR
    tags: ["v*"]        # a version tag runs goreleaser directly
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Auto-versioning from conventional commits. Mints a MunMiu GitHub App token so the
  # release commit/tag it creates re-triggers the goreleaser job below (a GITHUB_TOKEN
  # tag would not trigger downstream workflows).
  release-please:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_MUNMIU_PRIVATE_KEY }}
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Auto-merge the version-bump PR once its checks pass, so a release ships
      # without a manual merge. Uses the app token (not GITHUB_TOKEN) so the merge
      # commit re-triggers this workflow's goreleaser job on the new tag.
      - name: Enable auto-merge on the release PR
        if: ${{ steps.release.outputs.pr }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          # Pass step/context values via env (never inline ${{ }} in run:) to avoid
          # shell injection through the release-please output.
          RELEASE_PR: ${{ steps.release.outputs.pr }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          pr_num="$(printf '%s' "$RELEASE_PR" | jq -r '.number')"
          [ -n "$pr_num" ] && [ "$pr_num" != "null" ] || { echo "no release PR number"; exit 0; }
          gh pr merge "$pr_num" --squash --auto -R "$REPO" || \
            echo "::warning::could not enable auto-merge on PR #$pr_num (may already be mergeable; will need a manual merge)"

  # Builds + publishes binaries/checksums on any v* tag. Homebrew tap publish is
  # skipped automatically when HOMEBREW_TAP_GITHUB_TOKEN is not configured, so the
  # GitHub release (and install.sh) works without it.
  goreleaser:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.8"
          cache-dependency-path: go.sum
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: v2.15.4
          install-only: true
      - name: GoReleaser release
        run: |
          skip=""
          if [ -z "$HOMEBREW_TAP_GITHUB_TOKEN" ]; then
            echo "::notice::HOMEBREW_TAP_GITHUB_TOKEN absent — skipping Homebrew tap publish"
            skip="--skip=homebrew"
          fi
          goreleaser release --clean $skip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}

      # Rebuild the docs on main now the tag exists, so the CI-stamped version is
      # current. We dispatch on main (not the tag) because the github-pages
      # environment only allows deploys from main — a tag-triggered Pages deploy
      # is rejected by the environment protection rule.
      - name: Refresh docs to the new version
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run "Deploy Documentation" --ref main

  # release-please creates the release; rewrite its body after goreleaser uploads assets.
  marketplace-release-notes:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: goreleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Write release notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG_NAME="${GITHUB_REF_NAME}"
          NOTES_FILE="$(mktemp)"

          cat > "$NOTES_FILE" <<'TEMPLATE'
          ## miu-cr __TAG__

          AI code review for local changes and GitHub pull requests. Use it as a CLI, CI gate, or GitHub Action with your own LLM key.

          ### Install

          ```sh
          curl -fsSL https://raw.githubusercontent.com/vanducng/miu-cr/main/install.sh | sh -s -- __TAG__
          brew install vanducng/tap/miucr
          go install github.com/vanducng/miu-cr/cmd/miucr@__TAG__
          ```

          GitHub Action:

          ```yaml
          permissions:
            pull-requests: write

          steps:
            - uses: actions/checkout@v6
            - uses: vanducng/miu-cr@__TAG__
              with:
                api-key: ${{ '${{ secrets.ANTHROPIC_API_KEY }}' }}
          ```

          ### Common commands

          ```sh
          miucr login --provider openai
          miucr review --staged
          miucr review --from main --to HEAD --gate high
          miucr review --pr owner/repo#123 --post
          miucr upgrade
          ```

          Docs: https://cr.miu.sh
          TEMPLATE

          python3 - "$NOTES_FILE" "$TAG_NAME" <<'PY'
          import pathlib
          import sys

          path = pathlib.Path(sys.argv[1])
          path.write_text(path.read_text().replace("__TAG__", sys.argv[2]))
          PY

          gh release edit "$TAG_NAME" \
            --title "$TAG_NAME" \
            --notes "$(cat "$NOTES_FILE")"
