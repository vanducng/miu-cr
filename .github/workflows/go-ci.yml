name: go-ci

# Keyless checks only — every unit test injects a fakeAgent, so no ANTHROPIC_API_KEY
# is needed. Never run a live `miucr review` here.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.8"
      - run: echo "GOFLAGS=-buildvcs=false" >> "$GITHUB_ENV"

      - name: Test
        run: go test ./...

      - name: Race-test serve daemon
        run: go test -race -count=1 ./internal/serve/...

      - name: Vet
        run: go vet ./...

      - name: MCP initialize handshake smoke (keyless)
        run: go test ./tests/ -run TestMCPHandshakeSmoke -count=1

      - name: Build static binary
        run: CGO_ENABLED=0 go build -o /tmp/miucr ./cmd/miucr

      - name: Assert static binary (no cgo / no dynamic libs)
        run: |
          file /tmp/miucr
          if ldd /tmp/miucr 2>&1 | grep -qv "not a dynamic executable"; then
            echo "ERROR: /tmp/miucr is dynamically linked — cgo leaked into the build" >&2
            exit 1
          fi

      # Compile every goreleaser target so a GOOS-specific break (e.g. a
      # Unix-only syscall) fails here, not at release time.
      - name: Cross-compile release targets
        run: |
          for t in windows/amd64 darwin/amd64 darwin/arm64; do
            echo "building $t"
            GOOS=${t%/*} GOARCH=${t#*/} CGO_ENABLED=0 go build -o /dev/null ./cmd/miucr
          done

  # Additive (non-required) job: runs the shared backend-conformance suite against
  # REAL Postgres via a service container, so the Postgres path is exercised every
  # PR (an env-gated-only test that nothing sets in CI would rot). Still keyless —
  # no ANTHROPIC_API_KEY, no live review. The required gate stays the `test` job.
  postgres-conformance:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17   # pgvector image so CREATE EXTENSION vector + the EmbeddingStore tests run
        env:
          POSTGRES_USER: miucr
          POSTGRES_PASSWORD: miucr
          POSTGRES_DB: miucr_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U miucr"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      MIUCR_TEST_PG_DSN: postgres://miucr:miucr@localhost:5432/miucr_test?sslmode=disable
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.8"
      - run: echo "GOFLAGS=-buildvcs=false" >> "$GITHUB_ENV"

      - name: Backend conformance (SQLite + real Postgres)
        run: go test -count=1 ./internal/store/...
