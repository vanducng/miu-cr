name: Code Review

on:
  pull_request_target:
    types: [opened, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    if: >-
      ${{
        (
          github.event_name == 'pull_request_target' &&
          !startsWith(github.head_ref, 'release-please--') &&
          !startsWith(github.event.pull_request.title, 'chore(main): release ')
        ) ||
        (
          github.event_name == 'issue_comment' &&
          github.event.issue.pull_request &&
          github.event.comment.user.type != 'Bot' &&
          contains(fromJSON('["OWNER","MEMBER"]'), github.event.comment.author_association) &&
          (
            startsWith(github.event.comment.body, '/ocr') ||
            startsWith(github.event.comment.body, '@ocr')
          )
        )
      }}
    # Explicit secrets (not `inherit`): the reusable workflow lives in a different
    # account (dataplanelabs), and `secrets: inherit` does not cross owners.
    uses: dataplanelabs/workflows/.github/workflows/code-review.yml@3f0b08bfbb333ad2b190decb8abe76afe8f2e429
    secrets:
      OCR_LLM_URL: ${{ secrets.OCR_LLM_URL }}
      OCR_LLM_AUTH_TOKEN: ${{ secrets.OCR_LLM_AUTH_TOKEN }}
      OCR_LLM_MODEL: ${{ secrets.OCR_LLM_MODEL }}
      OCR_LLM_USE_ANTHROPIC: ${{ secrets.OCR_LLM_USE_ANTHROPIC }}
      GH_APP_ID: ${{ secrets.GH_APP_ID }}
      GH_APP_MUNMIU_PRIVATE_KEY: ${{ secrets.GH_APP_MUNMIU_PRIVATE_KEY }}
