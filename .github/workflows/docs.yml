name: docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Resolve version
        run: echo "PUBLIC_MIUCR_VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo dev)" >> "$GITHUB_ENV"
      # Serve the canonical installer at cr.miu.sh/install.sh (single source: root install.sh).
      - name: Stage installer at site root
        run: cp install.sh docs/public/install.sh
      - name: Build with Astro
        uses: withastro/action@b7d53628f8b666036b0238aadb0b984a2a489f26 # v6
        with:
          path: ./docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check latest ref
        id: freshness
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if latest="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_REF_NAME}" --jq .sha 2>/dev/null)" && [ -n "$latest" ]; then
            if [ "$latest" != "$GITHUB_SHA" ]; then
              echo "stale=true" >> "$GITHUB_OUTPUT"
              echo "Skipping stale deployment for $GITHUB_SHA; latest ${GITHUB_REF_NAME} is $latest."
            else
              echo "stale=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "Unable to determine latest commit; proceeding with deployment."
            echo "stale=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Deploy to GitHub Pages
        id: deployment
        if: steps.freshness.outputs.stale != 'true'
        uses: actions/deploy-pages@v5
