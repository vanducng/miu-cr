version: 1

default_provider: anthropic

providers:
  anthropic:
    kind: anthropic
    model: claude-sonnet-4-5-20250929
    auth_env: ANTHROPIC_API_KEY

store:
  backend: postgres

github:
  default_account: personal-pat
  accounts:
    personal-pat:
      mode: pat
      auth_env: GITHUB_TOKEN
    partner-pat:
      mode: pat
      auth_env: GITHUB_COMPANY_TOKEN
    secret-helper-pat:
      mode: pat
      auth_command: ["gopass", "show", "-o", "github/example-partner-token"]
    company-app:
      mode: app
      app_id_env: MIUCR_EXAMPLE_GITHUB_APP_ID
      installation_id_env: MIUCR_EXAMPLE_GITHUB_APP_INSTALLATION_ID
      private_key_path_env: MIUCR_EXAMPLE_GITHUB_APP_PRIVATE_KEY_PATH

x:
  repo_defaults: &repo_defaults
    default_branch: main
    enabled: true
    poll: true
  review_defaults: &review_defaults
    gate: high
    filter_mode: diff_context
    min_severity: low
    # thinking: auto            # auto|off|low|medium|high — extended-thinking depth for
                                # host reviews ("" → auto). Lower it (e.g. medium) to cut
                                # per-review latency; can be overridden per repo below.
    timeout: 900s
    stalled_timeout: 5m
    # debounce: 2m                  # wait for the head to be stable this long before
                                    # reviewing, so a burst of pushes coalesces into one
                                    # review on the settled head ("" / 0s → review at once).
                                    # Raise it per repo for PRs that get pushed rapidly.
    provider_retry:
      max_retries: 10
      initial_backoff: 5s
      max_backoff: 2m
      max_elapsed: 3m            # caps the retry tail on an overloaded provider; the job
                                 # fails fast and the next poll requeues it, instead of one
                                 # review hanging in backoff for the full window
    expand: 20
    token_budget: 0
    deep_context: true
    context_hops: 1
    conversation: true
    mode: review
    tools:
      max_retries: 2
      max_turns: 24
      retry_backoff: 250ms
      symbol_context:
        max_bytes: 32768         # budget for the changed-symbol prefetch injected into the
                                 # first prompt; too small truncates it and the model spends
                                 # extra tool turns re-fetching what was dropped
        max_files: 2000
        max_parallel: 8

review:
  <<: *review_defaults
  subagents:
    mode: auto
    max_parallel: 2
    min_files: 8
    require_all: true
    agents:
      - name: go
        include: ["**/*.go"]
        system_prompt: "Focus on correctness, concurrency, error handling, and API compatibility."
      - name: web
        include: ["**/*.ts", "**/*.tsx", "**/*.js", "**/*.jsx"]
        system_prompt: "Focus on user-facing behavior, state flow, accessibility, and API contracts."
  pr_filter:
    default_action: include
    include_drafts: false
    comment_trigger_regexes:
      - '(^|\s)(/miucr review\b|@vanducng\b)'
    rules:
      - action: exclude
        title_regexes:
          - '^chore\(deps\):'          # generated dependency PRs (title, not author:
                                       # Renovate-style branches may be pushed by a human)
          - '^chore\(main\): release ' # release-please bump PRs
          - '^release: promote '       # staging→main promotion merges: hundreds of files
                                       # whose content was already reviewed on the source PRs

agent:
  system_prompt_file: prompts/default-reviewer.md

host:
  enabled: true
  addr: ":8080"
  workers: 4
  webhook: false
  poll: true
  poll_source: pulls
  poll_interval: 60s
  workspace_dir: /var/lib/miucr/host/workspaces
  workspace_strategy: worktree
  retention:
    janitor_interval: 15m
    workspace_ttl: 168h
    closed_workspace_ttl: 24h
    max_workspace_bytes: 50GiB
    max_workspaces: 100
    min_free_space: 10GiB
    db_ttl: 2160h
  review:
    post: true
    force: false
    suggest: true
    patch_repair: false
    thread_resolution_sync:
      mode: off
      interval: 5m
    approval:
      mode: off

repos:
  # Use case: noisy, high-traffic service repo — inline only medium+, keep the
  # summary comment lean, and mirror manual "Resolve conversation" clicks into
  # the summary ledger between pushes.
  - <<: *repo_defaults
    name: service-api
    slug: example-org/service-api
    git_url: https://github.com/example-org/service-api.git
    github_account: personal-pat
    agent:
      system_prompt_file: prompts/service-reviewer.md
    rules:
      - rules/service.md
    review:
      min_severity: medium
      context_hops: 1
      format: minimal
      anchor_recovery: false   # quote drift is rare on this repo; skip the rescue pass's extra spend
      thread_resolution_sync:
        mode: poll
        interval: 5m

  # Use case: high-churn data/ELT repo — heads get pushed in bursts and the
  # diffs are mostly SQL/DAG changes, so trade thinking depth for latency and
  # let pushes settle before spending a review.
  - <<: *repo_defaults
    name: example-dbt-project
    slug: example-org/example-dbt-project
    git_url: https://github.com/example-org/example-dbt-project.git
    github_account: personal-pat
    review:
      thinking: medium   # full extended thinking adds latency/tokens with little
                         # finding delta on focused SQL diffs
      debounce: 10m      # coalesce a push burst into one review on the settled head
      pr_filter:
        default_action: exclude   # allowlist mode: review only what matches below
        rules:
          - action: include
            authors: ["vanducng"]
          - action: include
            requested_reviewers: ["vanducng"]

  # Use case: auto-approve when the review is clean enough — threshold approval
  # submits APPROVE when only P4 (or no) findings remain, with a note listing
  # what was waived; anything P0-P3 blocks approval.
  - <<: *repo_defaults
    name: data-platform
    slug: example-org/data-platform
    git_url: https://github.com/example-org/data-platform.git
    github_account: company-app
    agent:
      system_prompt_file: prompts/data-reviewer.md
    rules:
      - rules/data
    review:
      gate: critical
      timeout: 1800s
      stalled_timeout: 8m
      suggest: false
      approval:
        mode: threshold
        max_priority: P4
        note: on_findings

  # Use case: observe-only onboarding — post: false runs the full review and
  # stores the result without writing anything to the PR; flip to true once
  # the rules/prompt are tuned.
  - <<: *repo_defaults
    name: infrastructure
    slug: example-platform/infrastructure
    git_url: git@github.com:example-platform/infrastructure.git
    github_account: partner-pat
    agent:
      system_prompt: |
        Review infrastructure changes with emphasis on rollout safety, least
        privilege, drift risk, and rollback clarity. Do not request cosmetic
        Terraform rewrites unless they reduce an operational risk.
    rules:
      - rules/infrastructure.md
    review:
      post: false
      force: false
      context_hops: 0
