# OpenAI / Codex via OAuth — reviews run on your ChatGPT Pro/Max plan (no API key, no API billing).
# Copy to ~/.config/miu/cr/config.toml, then authenticate once in the browser:
#   miucr login --provider openai
# Run:  miucr review --staged
# The token is cached in ~/.config/miu/cr/oauth.json (0600) — never in this file.

default_provider = "openai"

[providers.openai]
kind = "openai"
auth = "oauth"          # explicit: use my ChatGPT plan via `miucr login`, never an API key
# Auth comes from `miucr login` (OAuth). No key here.
# With auth = "oauth", an ambient OPENAI_API_KEY is IGNORED; only an explicit
# --api-key flag overrides (per call). Drop the auth line for the auto precedence.
